spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/moein_antik_shop
    username: postgres
    password: Admin@8810
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

storage:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: shop-media
    public-url: http://localhost:9000/shop-media
